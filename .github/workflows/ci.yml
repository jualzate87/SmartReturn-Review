# CI workflow for IDS Prototyping Environment
#
# Registry auth for @ids-ts/* and @genux-ds/* packages is handled via
# .yarnrc.yml scopes pointing to registry.npmjs.intuit.com.
# Configure IDPS credentials as needed for your environment.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validation:
    uses: actions-intuit/ibp-wf/.github/workflows/validation.yml@v1

  build-and-test:
    needs: validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack (Yarn 4 Berry support)
        run: corepack enable

      - name: Cache Yarn install state
        uses: actions/cache@v4
        with:
          path: .yarn/install-state.gz
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Check tokens
        run: yarn check-tokens
